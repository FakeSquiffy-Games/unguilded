[limits]
file_lines_soft = 250
file_lines_hard = 400
function_lines = 40
function_lines_critical = 70
max_parameters = 4
max_nesting = 4
cyclomatic_warning = 10
cyclomatic_critical = 15
ascii_only_project_wide = false

[checks]
file_length = true
function_length = true
cyclomatic_complexity = true
parameters = true
nesting = true
todo_comments = true
print_statements = true
empty_functions = true
magic_numbers = true
commented_code = true
missing_types = true
god_class = true
naming_conventions = true
unused_variables = true
unused_parameters = true
ascii_only = true
sealed_classes = true

[exclude]
paths = addons/, tests/
